name: Deploy → HostGator

on:
  push:
    branches:
      - main   # dispara automaticamente a cada push na branch main

jobs:
  deploy:
    name: FTP Upload
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Deploy via FTPS para HostGator
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:           162.241.203.171
          username:         mate3251
          password:         ${{ secrets.FTP_PASSWORD }}
          protocol:         ftps
          port:             21
          server-dir:       public_html/
          local-dir:        ./
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.DS_Store
            **/Fotos Retratista/**
            **/FOTOS LUCIANO FERNANDES/**
            **/FOTOS CLIENTES/**
