name: Deploy → HostGator

on:
  push:
    branches:
      - main   # dispara automaticamente a cada push na branch main

jobs:
  deploy:
    name: FTP Upload
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Deploy via lftp para HostGator
        env:
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          sudo apt-get install -y lftp -q
          lftp -u "mate3251,$FTP_PASSWORD" ftp://162.241.203.171 <<'LFTP_SCRIPT'
            set ftp:ssl-allow true
            set ftp:passive-mode true
            set net:timeout 30
            set net:max-retries 3
            mirror \
              --reverse \
              --parallel=4 \
              --verbose \
              --ignore-time \
              --exclude-glob .git* \
              --exclude-glob .github* \
              --exclude-glob .DS_Store \
              --exclude-glob node_modules/ \
              --exclude-glob "Fotos Retratista/" \
              --exclude-glob "FOTOS LUCIANO FERNANDES/" \
              --exclude-glob "FOTOS CLIENTES/" \
              . /public_html/
            quit
          LFTP_SCRIPT
